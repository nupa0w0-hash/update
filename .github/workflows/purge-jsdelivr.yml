name: Purge jsDelivr cache

on:
  push:
    branches:
      - main
    paths:
      - "*.js"
  workflow_dispatch:

jobs:
  purge:
    runs-on: ubuntu-latest
    env:
      EXPECTED_SUPERVIBEBOT_VERSION: "1.5.0"
      SUPERVIBEBOT_LEGACY_JSDELIVR_URL: "https://cdn.jsdelivr.net/gh/nupa0w0-hash/update@main/SuperVibeBot.update.js"
    steps:
      - name: Verify current commit content
        shell: bash
        run: |
          set -euo pipefail
          expected_regex="${EXPECTED_SUPERVIBEBOT_VERSION//./\\.}"
          current_commit_url="https://raw.githubusercontent.com/nupa0w0-hash/update/${GITHUB_SHA}/SuperVibeBot.update.js"
          body="$(curl -fsSL "${current_commit_url}")"
          echo "${body}" | sed -n '1,8p'
          echo "${body}" | grep -q "^//@version ${expected_regex}"

      - name: Purge legacy jsDelivr URLs
        shell: bash
        run: |
          set -euo pipefail

          purge_once() {
            local path="$1"
            local url="https://purge.jsdelivr.net/gh/nupa0w0-hash/update${path}"
            echo "purge ${url}"
            local response
            response="$(curl -fsSL "${url}" || true)"
            echo "${response}"
            printf '%s' "${response}" | python3 -c 'import json,sys; data=json.load(sys.stdin) if not sys.stdin.isatty() else {}; print(max([int(v.get("throttlingReset") or 0) for v in (data.get("paths") or {}).values()] or [0]))' 2>/dev/null || echo 0
          }

          paths=(
            "@main/SuperVibeBot.update.js"
            "/SuperVibeBot.update.js"
            "@main/SuperVibeBot.js"
            "/SuperVibeBot.js"
            "@main/SuperVibeBot.auto.js"
            "/SuperVibeBot.auto.js"
            "@main"
            ""
          )

          max_reset=0
          for path in "${paths[@]}"; do
            reset="$(purge_once "${path}" | tail -n 1)"
            if [[ "${reset}" =~ ^[0-9]+$ ]] && (( reset > max_reset )); then
              max_reset="${reset}"
            fi
          done

          if (( max_reset > 0 )); then
            wait_seconds=$(( max_reset + 15 ))
            echo "jsDelivr purge throttled; waiting ${wait_seconds}s before one retry"
            sleep "${wait_seconds}"
            for path in "${paths[@]}"; do
              purge_once "${path}" >/dev/null
            done
          fi

      - name: Verify SuperVibeBot legacy update URL
        shell: bash
        run: |
          set -euo pipefail
          expected_regex="${EXPECTED_SUPERVIBEBOT_VERSION//./\\.}"
          for attempt in $(seq 1 30); do
            echo "verify attempt ${attempt}"
            body="$(curl -fsSL "${SUPERVIBEBOT_LEGACY_JSDELIVR_URL}" || true)"
            echo "${body}" | sed -n '1,8p'
            if echo "${body}" | grep -q "^//@version ${expected_regex}" \
              && echo "${body}" | grep -q '^//@update-url https://raw.githubusercontent.com/nupa0w0-hash/update/refs/heads/main/SuperVibeBot.update.js'; then
              echo "SuperVibeBot legacy jsDelivr update URL is fresh."
              exit 0
            fi
            sleep 60
          done
          echo "SuperVibeBot legacy jsDelivr update URL is still stale after retries." >&2
          exit 1
